<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumina - Fragrance Free Self-Care & Fragrance</title>

    <!-- Content-Security-Policy -->
    <!-- GitHub Pages (static hosting) can't set real HTTP security headers,
         so this meta-tag CSP is the only defense-in-depth option available
         here. Honest limitation: script-src needs 'unsafe-inline' because
         the GA/consent/Meta Pixel snippets below are inline scripts with
         no build-time nonce/hash step -- this does weaken protection
         against inline-script injection specifically, but it still blocks
         loading any *external* script from a domain not explicitly listed
         here, which is the more common real-world attack path (a
         compromised or malicious third-party script tag). -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://ajax.googleapis.com https://connect.facebook.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.myshopify.com https://www.google-analytics.com https://www.googletagmanager.com https://connect.facebook.net https://*.facebook.com; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';"
    />

    <!-- Google Analytics 4 -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      // Consent Mode v2: default to denied for every visitor until they
      // explicitly accept via the cookie banner (see CookieConsent.tsx).
      // This MUST run before gtag("config", ...) below, or the very first
      // pageview fires before any consent decision has been recorded.
      gtag("consent", "default", {
        analytics_storage: "denied",
        ad_storage: "denied",
        ad_user_data: "denied",
        ad_personalization: "denied",
      });
      gtag("js", new Date());
      gtag("config", "G-XXXXXXXXXX");
    </script>
    <meta
      name="description"
      content="Lumina creates clean-inspired bath, body, and fragrance essentials. From fragrance-free daily care to thoughtfully composed scent, each product is handcrafted in Calgary with intention and care."
    />
    <meta name="author" content="Lumina" />
    <meta
      name="keywords"
      content="clean beauty, handcrafted skincare, fragrance-free, fragrance oil, Calgary, self-care, bath and body, lumina"
    />

    <!-- Google Search Console Verification -->
    <meta
      name="google-site-verification"
      content="YOUR_VERIFICATION_CODE_HERE"
    />

    <!-- Facebook Domain Verification -->
    <meta
      name="facebook-domain-verification"
      content="5yfh5jsfsp15somirwx7ocvmejcwrc"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap"
    />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Open Graph / Facebook -->
    <meta
      property="og:title"
      content="Lumina - Clean-Inspired Self-Care & Fragrance"
    />
    <meta
      property="og:description"
      content="Clean-inspired bath, body, and fragrance essentials handcrafted in Calgary. From fragrance-free daily care to thoughtfully composed scent."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://luminaco.skin/" />
    <meta
      property="og:image"
      content="https://luminaco.skin/images/og%20image.png"
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Lumina - Clean-Inspired Self-Care & Fragrance"
    />
    <meta
      name="twitter:description"
      content="Clean-inspired bath, body, and fragrance essentials handcrafted in Calgary."
    />
    <meta
      name="twitter:image"
      content="https://luminaco.skin/images/og%20image.png"
    />

    <!-- Google Model Viewer for 3D models -->
    <script
      type="module"
      src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"
    ></script>

    <!-- Meta Pixel Code (loader only) -->
    <!-- This IIFE only loads Facebook's SDK and defines window.fbq -- it does
         NOT send any pageview data. The actual fbq('init', ...) and
         fbq('track', 'PageView') calls that send data to Facebook are
         gated behind cookie consent in CookieConsent.tsx, so nothing is
         reported for a visitor until they've made a consent choice. -->
    <script>
      !(function (f, b, e, v, n, t, s) {
        if (f.fbq) return;
        n = f.fbq = function () {
          n.callMethod
            ? n.callMethod.apply(n, arguments)
            : n.queue.push(arguments);
        };
        if (!f._fbq) f._fbq = n;
        n.push = n;
        n.loaded = !0;
        n.version = "2.0";
        n.queue = [];
        t = b.createElement(e);
        t.async = !0;
        t.src = v;
        // Handle script loading errors (e.g., blocked by ad blockers)
        t.onerror = function () {
          console.warn(
            "Facebook Pixel could not be loaded (may be blocked by ad blocker)"
          );
        };
        s = b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t, s);
      })(
        window,
        document,
        "script",
        "https://connect.facebook.net/en_US/fbevents.js"
      );
    </script>
    <!-- End Meta Pixel Code (loader) -->
  </head>

  <body>
    <!-- Meta Pixel Noscript -->
    <!-- Known limitation: this fallback only affects visitors with
         JavaScript disabled, so the JS-based consent gating above can't
         reach it -- it fires unconditionally for that small audience.
         Removing it would fully block Meta Pixel for no-JS visitors
         instead; left as the standard, accepted tradeoff for this
         pattern. -->
    <noscript>
      <img
        height="1"
        width="1"
        src="https://www.facebook.com/tr?id=26125074270423981&ev=PageView&noscript=1"
      />
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
